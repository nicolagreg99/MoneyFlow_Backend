name: Deploy to Server

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Sync project files to /home/nicola/app-money/app
      run: |
        mkdir -p /home/nicola/app-money/app
        rsync -az --delete --exclude '.git' ./ /home/nicola/app-money/app/

    - name: Setup environment and restart service
      run: |
        set -e
        cd /home/nicola/app-money/app
        
        if [ ! -d ".venv" ]; then
          python3 -m venv .venv
        fi
        
        source .venv/bin/activate
        
        pip install --upgrade pip setuptools wheel
        
        pip install --prefer-binary -r requirements.txt
        
        sudo systemctl restart moneyflow.service
        echo "Deployment completato e servizio riavviato con successo!"