name: Deploy to Server

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Sync project files to /home/nicola/app-money/app
      run: |
        mkdir -p /home/nicola/app-money/app
        rsync -az --delete --exclude '.git' ./ /home/nicola/app-money/app/

    - name: Setup environment and restart service
      run: |
        set -e
        cd /home/nicola/app-money/app
        python3 -m venv .venv || true
        source .venv/bin/activate 
        pip install --upgrade pip
        pip install -r requirements.txt
        
        sudo systemctl restart moneyflow.service
        echo "Deployment completed and service restarted."